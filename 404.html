<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Página não encontrada | Sparkfilmes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Montserrat", sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 15% 20%, rgba(255, 44, 88, 0.24), transparent 40%),
          linear-gradient(130deg, #000000, #0a0a0a);
        color: #f1f0f0;
        padding: 1.2rem;
      }
      main {
        max-width: 640px;
        text-align: center;
        border: 1px solid rgba(241, 240, 240, 0.22);
        border-radius: 18px;
        background: linear-gradient(160deg, rgba(18, 18, 18, 0.96), rgba(10, 10, 10, 0.94));
        padding: 1.6rem;
      }
      h1 {
        margin: 0 0 0.7rem;
        font-size: clamp(1.8rem, 5vw, 3rem);
      }
      p {
        margin: 0 0 1rem;
        color: #b7b7b7;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0.75rem 1.2rem;
        border: 1px solid rgba(241, 240, 240, 0.22);
        background: linear-gradient(135deg, #ff2c58, #d61f46);
        color: #f1f0f0;
        text-decoration: none;
        font-weight: 700;
      }
    </style>

  <body>
    <main>
      <h1>Página não encontrada</h1>
