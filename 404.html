<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pagina nao encontrada | SparkFilmes</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 15% 20%, rgba(255, 44, 88, 0.22), transparent 40%),
          linear-gradient(130deg, #f1f0f0, #ffffff);
        color: #000000;
        padding: 1.2rem;
      }
      main {
        max-width: 640px;
        text-align: center;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.82);
        padding: 1.6rem;
      }
      h1 {
        margin: 0 0 0.7rem;
        font-size: clamp(1.8rem, 5vw, 3rem);
      }
      p {
        margin: 0 0 1rem;
        color: #3f3f3f;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0.75rem 1.2rem;
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: linear-gradient(135deg, rgba(255, 44, 88, 0.88), rgba(255, 44, 88, 0.68));
        color: #000000;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pagina nao encontrada</h1>
