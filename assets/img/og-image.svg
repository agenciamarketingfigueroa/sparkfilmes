<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">SparkFilmes</title>
  <desc id="d">Videos que transformam atencao em clientes</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#000000" />
      <stop offset="0.5" stop-color="#0a0a0a" />
      <stop offset="1" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff2c58" stop-opacity="0.88" />
      <stop offset="1" stop-color="#d61f46" stop-opacity="0.72" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="210" cy="120" r="160" fill="#ff2c58" opacity="0.17" />
  <circle cx="1030" cy="90" r="120" fill="#ff2c58" opacity="0.11" />
